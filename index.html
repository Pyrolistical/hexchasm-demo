<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#002b36" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest-5v9s8avb.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-192-0m7f0dx4.png" />
    <title>Hex Word Connections</title>
    <style>
      :root {
        /* solarized theme https://ethanschoonover.com/solarized/ */
        --base03: #002b36;
        --base02: #073642;
        --base01: #586e75;
        --base00: #657b83;
        --base0: #839496;
        --base1: #93a1a1;
        --base2: #eee8d5;
        --base3: #fdf6e3;
        --yellow: #b58900;
        --orange: #cb4b16;
        --red: #dc322f;
        --magenta: #d33682;
        --violet: #6c71c4;
        --blue: #268bd2;
        --cyan: #2aa198;
        --green: #859900;

        --dark-background: var(--base03);
        --dark-foreground: var(--base0);
        --dark-cell-background: var(--base02);
        --dark-cell-foreground: var(--base0);

        --light-cell-backround: var(--base3);
        --light-cell-foreground: var(--base00);

        --background: var(--dark-background);
        --foreground: var(--dark-foreground);
        --cell-background: var(--dark-cell-background);
        --cell-foreground: var(--dark-cell-foreground);
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        background: var(--background);
        color: var(--foreground);
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
      }
      #app {
        max-width: 600px;
        margin: 0 auto;
        padding: 16px;
      }
      canvas {
        display: block;
        width: 100%;
        border: 1px solid var(--base01);
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      @media (orientation: portrait) {
        canvas {
          width: 100vw;
          margin-left: calc(50% - 50vw);
          border-left: none;
          border-right: none;
        }
      }
      #preview {
        text-align: center;
        font-size: 24px;
        height: 36px;
        margin: 8px 0;
        letter-spacing: 4px;
      }
      #remaining {
        text-align: center;
        font-size: 14px;
        color: var(--base01);
        margin-bottom: 8px;
      }
      #found {
        margin-top: 16px;
      }
      #found h2 {
        font-size: 16px;
        margin-bottom: 8px;
      }
      #found ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #found li {
        padding: 4px 12px;
        background: var(--cell-background);
        color: var(--cell-foreground);
        border-radius: 4px;
        font-size: 14px;
        user-select: text;
        -webkit-user-select: text;
      }
      #found li .word {
        letter-spacing: 2px;
        font-weight: bold;
        margin-right: 8px;
      }
      #found li .definition {
        color: var(--base01);
      }
      #found li.bonus {
        background: var(--cell-background);
        color: var(--yellow);
      }
      #message {
        text-align: center;
        font-size: 18px;
        margin-top: 12px;
      }
      #picker {
        width: 100%;
        padding: 8px;
        font-size: 16px;
        margin-bottom: 12px;
      }
      #reveal {
        display: block;
        margin: 12px auto 0;
        padding: 8px 16px;
        font-size: 14px;
      }
    </style>
  <script type="module" crossorigin src="./index-hegc7gxr.js"></script></head>
  <body>
    <div id="app">
      <select id="picker"></select>
      <div id="preview"></div>
      <div id="remaining"></div>
      <canvas id="board"></canvas>
      <button id="reveal">Reveal remaining</button>
      <div id="found">
        <h2>Found</h2>
        <ul></ul>
      </div>
      <div id="message"></div>
    </div>
    
  </body>
</html>
